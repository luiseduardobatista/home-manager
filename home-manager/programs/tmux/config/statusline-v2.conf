# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold]ļ’‰ #S #[fg=${gray_light},nobold] | "
set -g status-right "ļ’¼ #{cpu}  ī‰¦ #{mem} "
set -g window-status-current-format "#[fg=${cyan_soft},bold] ļ‘„ #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, ó°¨‹ ,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"
